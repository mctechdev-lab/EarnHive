<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EarnHive — Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23111'/%3E%3Cpolygon points='50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5' fill='%23F5B800' opacity='0.9'/%3E%3Ctext y='68' x='18' font-size='55' font-weight='900' fill='%23111' font-family='Arial'%3EEH%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#F5B800;--gold2:#E5A800;--gold-l:rgba(245,184,0,0.1);--gold-b:rgba(245,184,0,0.2);
  --g:#16A34A;--g2:#15803D;--g-l:rgba(22,163,74,0.1);--g-b:rgba(22,163,74,0.2);
  --dark:#080808;--dark2:#0F0F0F;--dark3:#161616;--dark4:#1C1C1C;
  --text:#F5F5F5;--t2:#A8A8A8;--t3:#555;
  --border:rgba(255,255,255,0.07);--border2:rgba(245,184,0,0.18);
  --sidebar-w:250px;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
html,body{height:100%;font-family:var(--font-b);background:var(--dark);color:var(--text);overflow:hidden;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(245,184,0,0.2)}50%{box-shadow:0 0 40px rgba(245,184,0,0.4)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}

/* APP WRAPPER */
.app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;}
.sidebar::-webkit-scrollbar{width:0;}

/* Logo */
.sb-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sb-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(245,184,0,0.3);animation:glow 3s ease-in-out infinite;flex-shrink:0;}
.sb-logo-text{font-family:var(--font-h);font-size:18px;font-weight:800;color:var(--text);}
.sb-logo-text em{color:var(--gold);font-style:normal;}

/* User info */
.sb-user{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:14px;font-weight:800;color:var(--dark);flex-shrink:0;}
.sb-uname{font-size:14px;font-weight:700;color:var(--text);}
.sb-ustatus{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g);margin-top:2px;}
.sb-udot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 2s infinite;}

/* Wallet card in sidebar */
.sb-wallet{margin:14px;background:linear-gradient(135deg,#1A1200,#0F0A00);border:1px solid var(--gold-b);border-radius:14px;padding:16px;flex-shrink:0;}
.sw-label{font-size:10px;font-weight:700;color:rgba(245,184,0,0.6);letter-spacing:0.5px;margin-bottom:4px;}
.sw-amount{font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--gold);margin-bottom:2px;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--gold),#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;background-size:200% auto;}
.sw-sub{font-size:11px;color:var(--t2);margin-bottom:14px;}
.sw-btns{display:flex;gap:8px;}
.sw-btn{flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid rgba(245,184,0,0.25);background:rgba(245,184,0,0.08);color:var(--gold);cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;}
.sw-btn:hover{background:rgba(245,184,0,0.15);}
.sw-btn i{font-size:10px;}

/* Nav */
.sb-nav{flex:1;padding:12px;overflow-y:auto;}
.sb-nav::-webkit-scrollbar{width:0;}
.nav-section-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;padding:8px 10px 6px;}
.nav-btn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--t2);font-size:14px;font-weight:500;border:none;background:none;text-align:left;font-family:var(--font-b);margin-bottom:2px;position:relative;}
.nav-btn:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.nav-btn.active{background:var(--gold-l);color:var(--gold);border:1px solid var(--gold-b);}
.nav-btn.active .nav-icon{color:var(--gold);}
.nav-icon{width:20px;text-align:center;font-size:16px;color:var(--t3);flex-shrink:0;transition:color .2s;}
.nav-btn:hover .nav-icon{color:var(--text);}
.nav-label-text{flex:1;}
.nav-badge{background:var(--gold);color:var(--dark);font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;}
.nav-badge.green{background:var(--g);color:#fff;}
.nav-badge.red{background:#EF4444;color:#fff;}

/* Logout */
.sb-logout{padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.logout-btn{width:100%;display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--t3);font-size:13px;font-weight:600;border:1px solid transparent;background:none;text-align:left;font-family:var(--font-b);}
.logout-btn:hover{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.15);color:#EF4444;}
.logout-btn i{font-size:15px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* TOPBAR */
.topbar{height:64px;background:var(--dark2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:40;}
.tb-left{display:flex;align-items:center;gap:14px;}
.hamburger{display:none;background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px;}
.page-title{font-family:var(--font-h);font-size:20px;font-weight:800;color:var(--text);}
.page-sub{font-size:12px;color:var(--t3);margin-top:2px;}
.tb-right{display:flex;align-items:center;gap:10px;}
/* Search */
.tb-search{display:flex;align-items:center;gap:8px;background:var(--dark3);border:1px solid var(--border);border-radius:9px;padding:8px 14px;transition:border-color .2s;}
.tb-search:focus-within{border-color:var(--gold-b);}
.tb-search i{color:var(--t3);font-size:13px;}
.tb-search input{background:none;border:none;outline:none;font-size:13px;color:var(--text);font-family:var(--font-b);width:160px;}
.tb-search input::placeholder{color:var(--t3);}
/* Icon btns */
.tb-ico{width:38px;height:38px;border-radius:9px;background:var(--dark3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:16px;transition:all .2s;position:relative;}
.tb-ico:hover{border-color:var(--gold-b);color:var(--gold);}
.notif-badge{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:#EF4444;border:1.5px solid var(--dark2);}

/* IFRAME WRAPPER */
.iframe-wrap{flex:1;position:relative;overflow:hidden;}
.iframe-wrap iframe{width:100%;height:100%;border:none;display:block;}
/* Page loader */
.page-loader{position:absolute;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;transition:opacity .3s;}
.page-loader.hidden{opacity:0;pointer-events:none;}
.loader-bee{font-size:48px;animation:blink 1.5s ease-in-out infinite;}
.loader-spin{width:36px;height:36px;border:3px solid var(--gold-l);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.loader-text{font-size:13px;color:var(--t2);}

/* ── MOBILE NAV ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--dark2);border-top:1px solid var(--border);padding:6px 0 8px;z-index:50;}
.mn-inner{display:flex;justify-content:space-around;}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;color:var(--t3);border:none;background:none;font-family:var(--font-b);transition:color .2s;}
.mn-btn.active,.mn-btn:hover{color:var(--gold);}
.mn-btn i{font-size:20px;}
.mn-btn span{font-size:10px;font-weight:600;}
.mn-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:2px;display:none;}
.mn-btn.active .mn-dot{display:block;}

/* SIDEBAR OVERLAY */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:49;backdrop-filter:blur(4px);}
.sb-overlay.open{display:block;}

/* DEPOSIT MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.overlay.open{display:flex;}
.modal{background:var(--dark3);border:1px solid var(--border);border-radius:20px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.6);animation:fadeIn .3s ease;overflow:hidden;}
.modal-head{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-family:var(--font-h);font-size:19px;font-weight:800;}
.modal-close{width:30px;height:30px;border-radius:8px;background:var(--dark4);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:14px;transition:all .2s;}
.modal-close:hover{color:var(--gold);}
.modal-body{padding:22px 24px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--t3);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:8px;}
.fg input,.fg select{width:100%;padding:12px 16px;background:var(--dark4);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font-b);outline:none;transition:all .2s;}
.fg input:focus,.fg select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,184,0,0.08);}
.fg input::placeholder{color:var(--t3);}
.fg select option{background:var(--dark3);}
.info-box{border-radius:10px;padding:12px 14px;font-size:13px;display:flex;gap:8px;margin-top:10px;}
.info-gold{background:var(--gold-l);border:1px solid var(--gold-b);color:var(--t2);}
.info-gold i{color:var(--gold);flex-shrink:0;margin-top:1px;}
.modal-foot{padding:0 24px 22px;display:flex;gap:10px;}
.btn-cancel{flex:1;padding:12px;background:var(--dark4);border:1px solid var(--border);border-radius:9px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .2s;}
.btn-cancel:hover{border-color:var(--border2);color:var(--text);}
.btn-confirm{flex:2;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:9px;color:var(--dark);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;}
.btn-confirm:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,184,0,0.3);}
.btn-confirm:disabled{opacity:0.6;pointer-events:none;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--dark3);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6);transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-ico{width:34px;height:34px;border-radius:9px;background:var(--gold-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.toast-ico i{font-size:14px;}
.toast-msg{font-size:13px;font-weight:600;color:var(--text);}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:50;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{width:100%;}
  .hamburger{display:flex;}
  .tb-search{display:none;}
  .mobile-nav{display:block;}
  .iframe-wrap{margin-bottom:60px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <!-- Logo -->
    <div class="sb-logo">
      <div class="sb-logo-mark">🐝</div>
      <div class="sb-logo-text">Earn<em>Hive</em></div>
    </div>
    <!-- User -->
    <div class="sb-user">
      <div class="sb-av" id="sb-av">--</div>
      <div>
        <div class="sb-uname" id="sb-name">Loading...</div>
        <div class="sb-ustatus"><span class="sb-udot"></span> Active</div>
      </div>
    </div>
    <!-- Wallet -->
    <div class="sb-wallet">
      <div class="sw-label">WALLET BALANCE</div>
      <div class="sw-amount" id="sb-balance">$0.00</div>
      <div class="sw-sub" id="sb-balance-sub">≈ 0 TON · Loading...</div>
      <div class="sw-btns">
        <button class="sw-btn" onclick="openDepositModal()"><i class="fa-solid fa-arrow-down"></i> Deposit</button>
        <button class="sw-btn" onclick="loadPage('settings')"><i class="fa-solid fa-arrow-up"></i> Withdraw</button>
      </div>
    </div>
    <!-- Nav -->
    <nav class="sb-nav">
      <div class="nav-section-label">Main Menu</div>
      <button class="nav-btn active" id="nav-dashboard" onclick="loadPage('dashboard')">
        <i class="nav-icon fa-solid fa-house"></i>
        <span class="nav-label-text">Dashboard</span>
      </button>
      <button class="nav-btn" id="nav-tasks" onclick="loadPage('tasks')">
        <i class="nav-icon fa-solid fa-list-check"></i>
        <span class="nav-label-text">Tasks</span>
        <span class="nav-badge green">New</span>
      </button>
      <button class="nav-btn" id="nav-jobs" onclick="loadPage('jobs')">
        <i class="nav-icon fa-solid fa-briefcase"></i>
        <span class="nav-label-text">Mini Jobs</span>
      </button>
      <button class="nav-btn" id="nav-games" onclick="loadPage('games')">
        <i class="nav-icon fa-solid fa-dice"></i>
        <span class="nav-label-text">Games</span>
        <span class="nav-badge">Live</span>
      </button>
      <div class="nav-section-label" style="margin-top:8px;">Earn More</div>
      <button class="nav-btn" id="nav-post" onclick="loadPage('post')">
        <i class="nav-icon fa-solid fa-plus-circle"></i>
        <span class="nav-label-text">Post Task / Job</span>
      </button>
      <button class="nav-btn" id="nav-referrals" onclick="loadPage('referrals')">
        <i class="nav-icon fa-solid fa-share-nodes"></i>
        <span class="nav-label-text">Refer & Earn</span>
        <span class="nav-badge" id="ref-badge" style="display:none;"></span>
      </button>
      <div class="nav-section-label" style="margin-top:8px;">Account</div>
      <button class="nav-btn" id="nav-notifications" onclick="loadPage('notifications')">
        <i class="nav-icon fa-regular fa-bell"></i>
        <span class="nav-label-text">Notifications</span>
        <span class="nav-badge red" id="notif-badge" style="display:none;"></span>
      </button>
      <button class="nav-btn" id="nav-settings" onclick="loadPage('settings')">
        <i class="nav-icon fa-solid fa-gear"></i>
        <span class="nav-label-text">Settings</span>
      </button>
      <button class="nav-btn" id="nav-about" onclick="loadPage('about')">
        <i class="nav-icon fa-solid fa-circle-info"></i>
        <span class="nav-label-text">About EarnHive</span>
      </button>
    </nav>
    <!-- Logout -->
    <div class="sb-logout">
      <button class="logout-btn" onclick="handleLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> Log Out
      </button>
    </div>
  </aside>

  <div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="tb-left">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <div>
          <div class="page-title" id="page-title">Dashboard</div>
          <div class="page-sub" id="page-sub">Welcome back! 🐝</div>
        </div>
      </div>
      <div class="tb-right">
        <div class="tb-search">
          <i class="fa-solid fa-search"></i>
          <input type="text" placeholder="Search tasks..."/>
        </div>
        <div class="tb-ico" onclick="loadPage('notifications')" title="Notifications">
          <i class="fa-regular fa-bell"></i>
          <div class="notif-badge" id="notif-dot" style="display:none;"></div>
        </div>
        <div class="tb-ico" onclick="loadPage('settings')" title="Profile">
          <i class="fa-regular fa-user"></i>
        </div>
      </div>
    </div>

    <!-- IFRAME -->
    <div class="iframe-wrap">
      <div class="page-loader" id="page-loader">
        <div class="loader-bee">🐝</div>
        <div class="loader-spin"></div>
        <div class="loader-text">Loading...</div>
      </div>
      <iframe id="main-frame" src="dashboard.html" onload="hideLoader()" allowfullscreen></iframe>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <div class="mn-inner">
    <button class="mn-btn active" id="mn-dashboard" onclick="loadPage('dashboard');setMob('dashboard')">
      <i class="fa-solid fa-house"></i><span>Home</span><div class="mn-dot"></div>
    </button>
    <button class="mn-btn" id="mn-tasks" onclick="loadPage('tasks');setMob('tasks')">
      <i class="fa-solid fa-list-check"></i><span>Tasks</span><div class="mn-dot"></div>
    </button>
    <button class="mn-btn" id="mn-games" onclick="loadPage('games');setMob('games')">
      <i class="fa-solid fa-dice"></i><span>Games</span><div class="mn-dot"></div>
    </button>
    <button class="mn-btn" id="mn-post" onclick="loadPage('post');setMob('post')">
      <i class="fa-solid fa-plus-circle"></i><span>Post</span><div class="mn-dot"></div>
    </button>
    <button class="mn-btn" id="mn-settings" onclick="loadPage('settings');setMob('settings')">
      <i class="fa-solid fa-gear"></i><span>Settings</span><div class="mn-dot"></div>
    </button>
  </div>
</div>

<!-- DEPOSIT MODAL -->
<div class="overlay" id="dep-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>💎 Deposit Funds</h3>
      <button class="modal-close" onclick="closeDepositModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>Payment Method</label>
        <select id="dep-method" onchange="updateDepMethod()">
          <option value="paystack">💳 Paystack (Bank/Card — Africa)</option>
          <option value="ton">💎 TON Coin (NOWPayments — Global)</option>
          <option value="usdt">🔵 USDT (NOWPayments — Global)</option>
          <option value="btc">₿ Bitcoin (NOWPayments — Global)</option>
        </select>
      </div>
      <div class="fg">
        <label>Amount</label>
        <input type="number" id="dep-amount" placeholder="Enter amount..." min="0"/>
      </div>
      <div class="info-box info-gold" id="dep-info">
        <i class="fa-solid fa-lock"></i>
        <span id="dep-info-text">Secured by Paystack. Funds reflect instantly after payment confirmation.</span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeDepositModal()">Cancel</button>
      <button class="btn-confirm" id="dep-confirm" onclick="handleDeposit()">
        <i class="fa-solid fa-lock"></i> Proceed to Pay
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-ico"><i class="fa-solid fa-circle-check" id="t-icon"></i></div>
  <div class="toast-msg" id="t-msg"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

const app = initializeApp({
  apiKey: "AIzaSyAPAJCqvt40OpIuQDNShW4mdZQgpcS8lW8",
  authDomain: "earnhive-8faa0.firebaseapp.com",
  projectId: "earnhive-8faa0",
  storageBucket: "earnhive-8faa0.firebasestorage.app",
  messagingSenderId: "807669517293",
  appId: "1:807669517293:web:37b20ab46d5c323e6a75e4"
});

const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.href='login.html';
    return;
  }

  // Check onboarding
  if(localStorage.getItem('eh_onboarding_done')!=='true'){
    window.location.href='onboarding.html';
    return;
  }

  // Check 7-day session
  const lastActive=localStorage.getItem('eh_last_active');
  if(lastActive){
    const days=(Date.now()-parseInt(lastActive))/(1000*60*60*24);
    if(days>7){ doLogout(); return; }
  }
  localStorage.setItem('eh_last_active',Date.now().toString());

  window._uid=user.uid;
  window._email=user.email;
  window._signOut=signOut;
  window._auth=auth;

  // Load real user data
  try{
    const res=await fetch('/api/me',{headers:{'x-firebase-uid':user.uid}});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error);
    const u=data.user;
    const w=u.wallet||{};

    // Save
    localStorage.setItem('eh_user',JSON.stringify(u));
    localStorage.setItem('eh_wallet',JSON.stringify(w));

    // Update sidebar
    const initials=`${(u.first_name||'')[0]||''}${(u.last_name||'')[0]||''}`.toUpperCase();
    document.getElementById('sb-av').textContent=initials;
    document.getElementById('sb-name').textContent=`${u.first_name} ${u.last_name}`;

    // Update wallet
    updateWallet(w.balance||0, u);

    // Notifications
    if(u.unread_notifications>0){
      document.getElementById('notif-dot').style.display='block';
      document.getElementById('notif-badge').textContent=u.unread_notifications;
      document.getElementById('notif-badge').style.display='inline';
    }

    // Referrals
    if(u.active_referrals>0){
      document.getElementById('ref-badge').textContent=u.active_referrals;
      document.getElementById('ref-badge').style.display='inline';
    }

    // Greeting
    const hour=new Date().getHours();
    const greet=hour<12?'Good morning':'Good afternoon';
    document.getElementById('page-sub').textContent=`${greet}, ${u.first_name}! 🐝`;

  } catch(e){
    console.error('Failed to load user:',e);
  }
});

function doLogout(){
  localStorage.clear();
  window.location.href='login.html';
}

// Expose updateWallet globally for iframes to call
window.updateWallet=function(balance, userData){
  const prefs=JSON.parse(localStorage.getItem('eh_prefs')||'{}');
  const symbol=prefs.country?.symbol||'$';
  const curr=prefs.country?.currency||'USD';
  // Format balance
  const formatted=parseFloat(balance||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('sb-balance').textContent=`${symbol}${formatted}`;
  // TON equivalent (approximate - $1 = 0.5 TON roughly)
  const tonEq=(parseFloat(balance||0)*0.5).toFixed(2);
  document.getElementById('sb-balance-sub').textContent=`≈ ${tonEq} TON · ${curr}`;
};
</script>

<script>
// ── PAGE NAVIGATION ──
const PAGE_TITLES={
  dashboard:{title:'Dashboard',sub:'Welcome back! 🐝'},
  tasks:{title:'Task Marketplace',sub:'Complete tasks and earn crypto instantly'},
  jobs:{title:'Mini Jobs',sub:'Freelance jobs posted by the community'},
  games:{title:'Games',sub:'Play Ludo & Whot — stake and win real money'},
  post:{title:'Post & Manage',sub:'Post tasks, review submissions & referrals'},
  referrals:{title:'Refer & Earn',sub:'Earn 10% of friends\' earnings for 7 days'},
  notifications:{title:'Notifications',sub:'Your latest activity and updates'},
  settings:{title:'Settings',sub:'Manage your account and preferences'},
  about:{title:'About EarnHive',sub:'Our story, vision and mission'},
};

function loadPage(page){
  showLoader();
  const info=PAGE_TITLES[page]||{title:page,sub:''};
  document.getElementById('page-title').textContent=info.title;
  document.getElementById('page-sub').textContent=info.sub;
  document.getElementById('main-frame').src=`${page}.html`;
  // Update nav active state
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navBtn=document.getElementById(`nav-${page}`);
  if(navBtn) navBtn.classList.add('active');
  closeSidebar();
}

function showLoader(){ document.getElementById('page-loader').classList.remove('hidden'); }
function hideLoader(){ document.getElementById('page-loader').classList.add('hidden'); }

// ── SIDEBAR TOGGLE ──
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
}

// ── MOBILE NAV ──
function setMob(page){
  document.querySelectorAll('.mn-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(`mn-${page}`);
  if(btn) btn.classList.add('active');
}

// ── DEPOSIT MODAL ──
function openDepositModal(){ document.getElementById('dep-modal').classList.add('open'); }
function closeDepositModal(){ document.getElementById('dep-modal').classList.remove('open'); }
document.getElementById('dep-modal').addEventListener('click',function(e){ if(e.target===this) closeDepositModal(); });

function updateDepMethod(){
  const method=document.getElementById('dep-method').value;
  const info={
    paystack:'Secured by Paystack. Funds reflect instantly after bank/card payment. Africa only.',
    ton:'Send TON coin to the generated address via NOWPayments. Ultra-low fees. Global.',
    usdt:'Send USDT (TRC20/ERC20) to the generated address via NOWPayments. Global.',
    btc:'Send Bitcoin to the generated address via NOWPayments. Global.',
  };
  document.getElementById('dep-info-text').textContent=info[method]||'';
}

async function handleDeposit(){
  const method=document.getElementById('dep-method').value;
  const amount=parseFloat(document.getElementById('dep-amount').value);
  if(!amount||amount<=0){ toast('Please enter a valid amount','error'); return; }
  const btn=document.getElementById('dep-confirm');
  btn.disabled=true;
  btn.innerHTML='<span style="width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:var(--dark);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;"></span> Processing...';
  try{
    if(method==='paystack'){
      const res=await fetch('/api/deposit',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({firebase_uid:window._uid,amount,email:window._email})
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data.error);
      closeDepositModal();
      window.open(data.authorization_url,'_blank');
      toast('Paystack payment page opened! Complete payment to fund wallet 💳');
    } else {
      // NOWPayments crypto
      const res=await fetch('/api/nowpayments',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({firebase_uid:window._uid,amount,currency:method,email:window._email})
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data.error);
      closeDepositModal();
      if(data.payment_url) window.open(data.payment_url,'_blank');
      else toast(`Send ${amount} ${method.toUpperCase()} to: ${data.pay_address}`);
    }
  } catch(e){
    toast(e.message,'error');
  }
  btn.disabled=false;
  btn.innerHTML='<i class="fa-solid fa-lock"></i> Proceed to Pay';
}

// ── LOGOUT ──
async function handleLogout(){
  if(!confirm('Are you sure you want to log out?')) return;
  localStorage.clear();
  if(window._signOut&&window._auth){
    await window._signOut(window._auth);
  }
  window.location.href='login.html';
}

// ── TOAST ──
function showToast(msg,type='success'){
  const c={success:{color:'#F5B800',ic:'fa-circle-check'},error:{color:'#EF4444',ic:'fa-circle-xmark'},info:{color:'#60A5FA',ic:'fa-circle-info'}};
  const col=c[type]||c.success;
  document.getElementById('t-icon').className=`fa-solid ${col.ic}`;
  document.getElementById('t-icon').style.color=col.color;
  document.getElementById('t-msg').textContent=msg;
  const t=document.getElementById('toast'); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
function toast(msg,type='success'){ showToast(msg,type); }

// Expose globally so iframes can call
window.loadPage=loadPage;
window.openDepositModal=openDepositModal;
window.toast=toast;
</script>
</body>
